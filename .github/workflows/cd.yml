name: CD Ecommerce

on:
  workflow_run:
    workflows: ["CI Ecommerce"]
    types:
      - completed

jobs:

  build:

    runs-on: self-hosted

    steps:
      - name: Pull docker image
        run: docker pull giancarlovalentin/ecommerce:latest
      - name: Delete old docker container
        run: sudo docker rm -f ecommerce || true
      - name: Run docker container
        run: sudo docker run -d -p 8080:8080 --name ecommerce giancarlovalentin/ecommerce:latest